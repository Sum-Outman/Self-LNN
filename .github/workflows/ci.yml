# 修复#11: SELF-LNN CI流水线
# 在Windows(MSVC/MinGW)和Linux(GCC/Clang)上执行构建和核心测试
name: SELF-LNN CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 手动触发

jobs:
  # ============================================================
  # Windows MSVC 构建 + 测试
  # ============================================================
  build-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: 配置CMake (MSVC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON

      - name: 构建
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: 运行核心验证测试
        run: |
          cd build
          ctest -C ${{ matrix.build_type }} --output-on-failure --test-dir .

  # ============================================================
  # Ubuntu GCC 构建 + 测试
  # ============================================================
  build-gcc:
    name: Ubuntu (GCC)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: 配置CMake (GCC)
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON
        env:
          CC: gcc

      - name: 构建
        run: cmake --build build --config ${{ matrix.build_type }} --parallel $(nproc)

      - name: 运行核心验证测试
        run: |
          cd build
          ctest --output-on-failure --test-dir .

  # ============================================================
  # Ubuntu Clang 构建 + 测试
  # ============================================================
  build-clang:
    name: Ubuntu (Clang)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang

      - name: 配置CMake (Clang)
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON
        env:
          CC: clang

      - name: 构建
        run: cmake --build build --config ${{ matrix.build_type }} --parallel $(nproc)

      - name: 运行核心验证测试
        run: |
          cd build
          ctest --output-on-failure --test-dir .
