<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能库管理 - SELF-LNN 全液态神经网络AGI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api-service.js"></script>
    <style>
        .skills-container { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: calc(100vh - 120px); }
        .skill-list { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; overflow-y: auto; }
        .skill-detail { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 20px; overflow-y: auto; }
        .skill-item { padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .skill-item:hover { background: rgba(0,200,255,0.1); border-color: rgba(0,200,255,0.3); }
        .skill-item.active { background: rgba(0,200,255,0.15); border-color: #00c8ff; }
        .skill-type { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-right: 5px; }
        .type-atomic { background: #2ecc71; color: #000; }
        .type-composite { background: #3498db; color: #fff; }
        .type-task { background: #e74c3c; color: #fff; }
        .type-meta { background: #9b59b6; color: #fff; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #00c8ff; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 5px; }
        .step-item { padding: 8px 12px; margin: 5px 0; background: rgba(255,255,255,0.03); border-left: 3px solid #00c8ff; border-radius: 0 4px 4px 0; }
        .tag { display: inline-block; padding: 3px 10px; background: rgba(0,200,255,0.15); color: #00c8ff; border-radius: 12px; font-size: 12px; margin: 2px; }
        .param-row { display: grid; grid-template-columns: 120px 80px 1fr; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-sm { padding: 5px 15px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-success { background: #2ecc71; color: #000; }
        .btn-warning { background: #f39c12; color: #000; }
        .search-box { width: 100%; padding: 10px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; margin-bottom: 10px; }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 5px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: rgba(0,200,255,0.2); border-color: #00c8ff; color: #00c8ff; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #00c8ff); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo"><h1>技能库管理</h1></div>
            <nav class="nav"><ul>
                <li><a href="index.html">仪表盘</a></li>
                <li><a href="training-center.html">训练中心</a></li>
                <li><a href="programming-workbench.html">编程工作台</a></li>
                <li><a href="multimodal-learn.html">多模态学习</a></li>
                <li><a href="simulation-control.html">仿真控制</a></li>
                <li><a href="device-control.html">设备控制</a></li>
                <li><a href="hardware-setup.html">硬件设置</a></li>
                <li><a href="safety.html">安全监控</a></li>
                <li><a href="knowledge-graph.html">知识图谱</a></li>
                <li><a href="skills.html" class="active">技能库</a></li>
                <li><a href="teach.html">示教学习</a></li>
                <li><a href="voice-control.html">语音控制</a></li>
                <li><a href="api-keys.html">API密钥</a></li>
                <li><a href="api-docs.html">API文档</a></li>
                <li><a href="usage-logs.html">使用日志</a></li>
            </ul></nav>
        </header>
        <main class="main-content">
            <span id="conn-status" class="status-badge" style="display:none">检测中...</span>

        <div class="stat-grid">
            <div class="stat-card"><div class="stat-value" id="total-skills">-</div><div class="stat-label">总技能数</div></div>
            <div class="stat-card"><div class="stat-value" id="atomic-skills">-</div><div class="stat-label">原子技能</div></div>
            <div class="stat-card"><div class="stat-value" id="success-rate">-</div><div class="stat-label">平均成功率</div></div>
            <div class="stat-card"><div class="stat-value" id="active-tasks">-</div><div class="stat-label">活动任务</div></div>
        </div>

        <div class="skills-container">
            <div class="skill-list">
                <input type="text" class="search-box" id="skill-search" placeholder="搜索技能..." oninput="filterSkills()">
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
                    <button class="filter-btn" onclick="setFilter('atomic', this)">原子</button>
                    <button class="filter-btn" onclick="setFilter('composite', this)">组合</button>
                    <button class="filter-btn" onclick="setFilter('task', this)">任务</button>
                    <button class="filter-btn" onclick="setFilter('meta', this)">元技能</button>
                </div>
                <div id="skill-list-container">
                    <div style="text-align:center;color:rgba(255,255,255,0.3);padding:30px;">加载中...</div>
                </div>
            </div>
            <div class="skill-detail" id="skill-detail">
                <div style="text-align:center;color:rgba(255,255,255,0.3);padding:50px;">选择一个技能查看详情</div>
            </div>
        </div>
    </main>

    <script>
        var currentFilter = 'all';
        var allSkills = [];
        var selectedSkillId = null;

        async function loadSkills() {
            try {
                var data = await SelfLnnApi.request('/skills', {method: 'GET'});
                if (data) {
                    allSkills = data.skills || [];
                } else {
                    allSkills = [];
                }
            } catch(e) {
                allSkills = [];
            }
            updateStats();
            renderSkillList();
        }

        function updateStats() {
            document.getElementById('total-skills').textContent = allSkills.length;
            document.getElementById('atomic-skills').textContent = allSkills.filter(function(s) { return s.type === 0; }).length;

            var totalSR = 0, srCount = 0;
            allSkills.forEach(function(s) {
                if (s.effectiveness && s.effectiveness.execution_count > 0) {
                    totalSR += s.effectiveness.success_rate;
                    srCount++;
                }
            });
            document.getElementById('success-rate').textContent = srCount > 0 ? (totalSR/srCount*100).toFixed(1)+'%' : 'N/A';
            document.getElementById('active-tasks').textContent = allSkills.filter(function(s) { return s.status === 'running'; }).length || 0;
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            renderSkillList();
        }

        function filterSkills() {
            renderSkillList();
        }

        function renderSkillList() {
            var search = document.getElementById('skill-search').value.toLowerCase();
            var filtered = allSkills;

            if (currentFilter === 'atomic') filtered = allSkills.filter(function(s) { return s.type === 0; });
            else if (currentFilter === 'composite') filtered = allSkills.filter(function(s) { return s.type === 1; });
            else if (currentFilter === 'task') filtered = allSkills.filter(function(s) { return s.type === 2; });
            else if (currentFilter === 'meta') filtered = allSkills.filter(function(s) { return s.type === 3; });

            if (search) {
                filtered = filtered.filter(function(s) {
                    return s.name.toLowerCase().indexOf(search) !== -1 ||
                           s.description.toLowerCase().indexOf(search) !== -1 ||
                           (s.tags && s.tags.some(function(t) { return t.toLowerCase().indexOf(search) !== -1; }));
                });
            }

            var container = document.getElementById('skill-list-container');
            var typeNames = ['原子', '组合', '任务', '元'];
            var typeClasses = ['type-atomic', 'type-composite', 'type-task', 'type-meta'];

            container.innerHTML = filtered.map(function(s) {
                var sr = s.effectiveness ? (s.effectiveness.success_rate*100).toFixed(0) : '-';
                var activeClass = s.id === selectedSkillId ? 'active' : '';
                var typeCls = typeClasses[s.type] || 'type-atomic';
                var typeName = typeNames[s.type] || '原子';
                var tagsHtml = (s.tags||[]).map(function(t) {
                    return '<span class="tag">' + t + '</span>';
                }).join('');
                var srColor = sr > 70 ? '#2ecc71' : (sr > 40 ? '#f39c12' : '#e74c3c');
                var progressHtml = s.effectiveness ? '<div class="progress-bar"><div class="progress-fill" style="width:' + (s.effectiveness.quality_score*100) + '%"></div></div>' : '';
                return '<div class="skill-item ' + activeClass + '" onclick="selectSkill(' + s.id + ')">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                        '<div>' +
                            '<span class="skill-type ' + typeCls + '">' + typeName + '</span>' +
                            '<strong>' + s.name + '</strong>' +
                        '</div>' +
                        '<span style="font-size:11px;color:rgba(255,255,255,0.4);">ID:' + s.id + '</span>' +
                    '</div>' +
                    '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:5px;">' + s.description.substring(0,60) + '</div>' +
                    '<div style="margin-top:8px;display:flex;justify-content:space-between;">' +
                        '<div>' + tagsHtml + '</div>' +
                        '<span style="font-size:11px;color:' + srColor + '">成功率:' + sr + '%</span>' +
                    '</div>' +
                    progressHtml +
                '</div>';
            }).join('');

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:30px;">未找到匹配的技能</div>';
            }
        }

        function selectSkill(id) {
            selectedSkillId = id;
            renderSkillList();
            var skill = allSkills.filter(function(s) { return s.id === id; })[0];
            if (!skill) return;

            var typeNames = ['原子', '组合', '任务', '元'];
            var typeClasses = ['type-atomic', 'type-composite', 'type-task', 'type-meta'];
            var eff = skill.effectiveness || {};
            var detail = document.getElementById('skill-detail');
            var tagsHtml = (skill.tags||[]).map(function(t) {
                return '<span class="tag">' + t + '</span>';
            }).join('');
            var paramsHtml = '';
            if (skill.params && skill.params.length > 0) {
                paramsHtml = '<h4 style="margin-top:20px;">参数</h4><div>' + skill.params.map(function(p) {
                    return '<div class="param-row">' +
                        '<span style="color:#00c8ff;">' + p.name + (p.required ? ' *' : '') + '</span>' +
                        '<span style="color:rgba(255,255,255,0.4);font-size:11px;">' + p.type + '</span>' +
                        '<span style="color:rgba(255,255,255,0.5);">' + (p.desc || '') + '</span>' +
                    '</div>';
                }).join('') + '</div>';
            }
            var stepsHtml = '';
            if (skill.steps && skill.steps.length > 0) {
                stepsHtml = '<h4 style="margin-top:20px;">执行步骤</h4>' + skill.steps.map(function(s, i) {
                    var timeHtml = s.time ? '<span style="color:rgba(255,255,255,0.3);float:right;">' + s.time + 'ms</span>' : '';
                    return '<div class="step-item">' +
                        '<span style="color:#00c8ff;">' + (i+1) + '.</span> ' + (s.action || s.desc) +
                        timeHtml +
                    '</div>';
                }).join('');
            }

            detail.innerHTML =
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">' +
                    '<div>' +
                        '<span class="skill-type ' + typeClasses[skill.type] + '" style="font-size:13px;">' + typeNames[skill.type] + '</span>' +
                        '<h2 style="display:inline;margin-left:10px;">' + skill.name + '</h2>' +
                    '</div>' +
                    '<div>' +
                        '<button class="btn-sm btn-warning" onclick="testSkill(' + skill.id + ')">测试执行</button>' +
                    '</div>' +
                '</div>' +
                '<p style="color:rgba(255,255,255,0.7);">' + skill.description + '</p>' +
                '<div style="margin:10px 0;">领域: <strong>' + (skill.domain || '通用') + '</strong></div>' +
                '<div>标签: ' + tagsHtml + '</div>' +
                paramsHtml + stepsHtml +
                '<h4 style="margin-top:20px;">效果评估</h4>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">' +
                    '<div class="stat-card" style="padding:10px;">' +
                        '<div class="stat-value" style="font-size:20px;">' + (eff.success_rate ? (eff.success_rate*100).toFixed(1)+'%' : 'N/A') + '</div>' +
                        '<div class="stat-label">成功率</div>' +
                    '</div>' +
                    '<div class="stat-card" style="padding:10px;">' +
                        '<div class="stat-value" style="font-size:20px;">' + (eff.execution_count||0) + '</div>' +
                        '<div class="stat-label">执行次数</div>' +
                    '</div>' +
                    '<div class="stat-card" style="padding:10px;">' +
                        '<div class="stat-value" style="font-size:20px;">' + (eff.quality_score ? (eff.quality_score*100).toFixed(1)+'%' : 'N/A') + '</div>' +
                        '<div class="stat-label">质量评分</div>' +
                    '</div>' +
                '</div>';
        }

        async function testSkill(id) {
            try {
                var data = await SelfLnnApi.executeSkill(id);
                alert(data && data.success ? '技能测试执行成功' : '技能测试失败: ' + ((data&&data.error) || '未知错误'));
            } catch(e) {
                alert('执行失败: ' + e.message);
            }
        }

        async function checkConnection() {
            try {
                var data = await SelfLnnApi.request('/status', {method: 'GET'});
                var badge = document.getElementById('conn-status');
                if (data) { badge.textContent = '已连接'; badge.style.background = '#2ecc71'; badge.style.color = '#000'; }
                else { badge.textContent = '未连接'; badge.style.background = '#e74c3c'; badge.style.color = '#fff'; }
            } catch(e) {
                var badge = document.getElementById('conn-status');
                badge.textContent = '未连接';
                badge.style.background = '#e74c3c';
                badge.style.color = '#fff';
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            checkConnection();
            loadSkills();
            setInterval(checkConnection, 30000);
        });
    </script>
    </div>
</body>
</html>
