    <div class="container">
        <header class="header">
            <div class="logo"><h1>API使用日志</h1></div>
            <nav class="nav"><ul>
                <li><a href="index.html">仪表盘</a></li>
                <li><a href="training-center.html">训练中心</a></li>
                <li><a href="programming-workbench.html">编程工作台</a></li>
                <li><a href="multimodal-learn.html">多模态学习</a></li>
                <li><a href="simulation-control.html">仿真控制</a></li>
                <li><a href="device-control.html">设备控制</a></li>

                <li><a href="safety.html">安全监控</a></li>
                <li><a href="knowledge-graph.html">知识图谱</a></li>
                <li><a href="skills.html">技能库</a></li>
                <li><a href="teach.html">示教学习</a></li>

                <li><a href="api-docs.html">API文档</a></li>
                <li><a href="usage-logs.html" class="active">使用日志</a></li>
            </ul></nav>
        </header>
        <main class="main-content">
            <div class="section-header"><h2>API调用统计与日志</h2><p>监控API调用频率、错误率和性能指标</p></div>
            <div class="card full-width">
                <div class="card-header"><h3>调用记录</h3></div>
                <div class="card-content">
                    <div class="table-container">
                        <table class="data-table">
                            <thead><tr><th>时间</th><th>端点</th><th>方法</th><th>状态码</th><th>耗时</th><th>客户端IP</th></tr></thead>
                            <tbody id="logs-body"><tr><td colspan="6" class="pending-text">等待连接</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header"><h3>统计摘要</h3></div>
                    <div class="card-content">
                        <div class="metric"><span class="metric-label">今日总数</span><span class="metric-value" id="today-total">-</span></div>
                        <div class="metric"><span class="metric-label">成功率</span><span class="metric-value" id="success-rate">-</span></div>
                        <div class="metric"><span class="metric-label">平均延迟</span><span class="metric-value" id="avg-latency">-</span></div>
                        <div class="metric"><span class="metric-label">活跃用户</span><span class="metric-value" id="active-users">-</span></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>端点排行</h3></div>
                    <div class="card-content">
                        <div id="endpoint-ranking" style="font-size:13px;color:rgba(255,255,255,0.7)">等待数据...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        async function loadLogs() {
            try {
                /* 使用系统状态API和API统计接口获取使用日志 */
                var resp = await SelfLnnApi.getServerStats();
                var data = resp.success ? resp.data : null;
                var stats = (data && data.system) ? data.system : {};
                document.getElementById('today-total').textContent = (stats.requests && stats.requests.total) ? stats.requests.total : '-';
                document.getElementById('success-rate').textContent = stats.success_rate ? (stats.success_rate*100).toFixed(1)+'%' : '-';
                document.getElementById('avg-latency').textContent = stats.avg_latency_ms ? stats.avg_latency_ms+'ms' : '-';
                document.getElementById('active-users').textContent = stats.active_clients || '-';
                
                /* 尝试获取详细API使用日志 */
                var logs = [];
                try {
                    var logResp = await SelfLnnApi.getApiStats();
                    if (logResp.success && logResp.data) {
                        logs = logResp.data.logs || logResp.data.requests || [];
                    }
                } catch(e) { /* 日志接口不可用时降级为系统统计 */ }
                
                var body = document.getElementById('logs-body');
                if (!logs.length) { 
                    body.innerHTML = '<tr><td colspan="6" class="pending-text">暂无日志（后端未开启详细日志）</td></tr>'; 
                    return; 
                }
                body.innerHTML = logs.slice(0, 50).map(function(l) {
                    return '<tr><td>'+(l.time||'-')+'</td><td>'+(l.endpoint||'-')+'</td><td>'+(l.method||'GET')+'</td><td>'+(l.status_code||200)+'</td><td>'+(l.duration_ms||0)+'ms</td><td>'+(l.client_ip||'-')+'</td></tr>';
                }).join('');

                /* 端点排行 */
                var ranking = {};
                logs.forEach(function(l) { var ep = l.endpoint||'unknown'; ranking[ep] = (ranking[ep]||0)+1; });
                var sorted = Object.keys(ranking).sort(function(a,b){ return ranking[b]-ranking[a]; }).slice(0,10);
                var rankingHtml = sorted.map(function(ep,i){ return '<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05)"><span style="color:#00c8ff">'+(i+1)+'.</span> '+ep+' <span style="float:right;color:rgba(255,255,255,0.4)">'+ranking[ep]+'次</span></div>'; }).join('');
                document.getElementById('endpoint-ranking').innerHTML = rankingHtml || '无数据';
            } catch(e) { console.warn('使用日志加载失败:', e.message); }
        }
        document.addEventListener('DOMContentLoaded', function() {
            loadLogs();
            setInterval(loadLogs, 30000);
        });
    </script>
</body>
</html>
