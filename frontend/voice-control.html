    <meta charset="UTF-8">

    <script src="js/compatibility.js"></script>
    <script src="js/api-service.js"></script>
    <script src="js/voice-capture-util.js"></script>
    <script src="js/voice-command.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo"><h1>语音指令控制</h1></div>
            <nav class="nav"><ul>
                <li><a href="index.html">仪表盘</a></li>
                <li><a href="training-center.html">训练中心</a></li>
                <li><a href="programming-workbench.html">编程工作台</a></li>

                <li><a href="device-control.html">设备控制</a></li>
                <li><a href="hardware-setup.html">硬件设置</a></li>

                <li><a href="usage-logs.html">使用日志</a></li>
            </ul></nav>
        </header>
        <main class="main-content">
            <div class="section-header"><h2>语音指令 — CfC液态神经网络语义理解</h2><p>音频→CfC ODE→运动指令：不需关键词词典，语义级别理解</p></div>
            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header"><h3>语音输入</h3></div>
                    <div class="card-content">
                        <button id="voice-btn" onclick="toggleVoice()" class="btn btn-primary" style="width:100%;padding:1.5rem;font-size:1.2rem">🎤 开始录音</button>
                        <div style="margin-top:10px"><label>识别结果</label><div id="voice-text" style="padding:0.5rem;background:rgba(255,255,255,0.05);border-radius:4px;min-height:2rem">等待语音输入...</div></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>运动指令</h3></div>
                    <div class="card-content">
                        <div class="metric"><span class="metric-label">指令类型</span><span class="metric-value" id="cmd-type">-</span></div>
                        <div class="metric"><span class="metric-label">参数</span><span class="metric-value" id="cmd-param">-</span></div>
                        <div class="metric"><span class="metric-label">置信度</span><span class="metric-value" id="cmd-conf">-</span></div>
                        <div class="metric"><span class="metric-label">执行状态</span><span class="metric-value" id="exec-status">就绪</span></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h3>文本指令</h3></div>
                    <div class="card-content">
                        <div class="form-group"><label>输入文本指令</label><input type="text" id="text-cmd" placeholder="前进/后退/左转/右转/停止/抓取..." class="form-input"></div>
                        <button onclick="sendTextCommand()" class="btn btn-primary" style="width:100%">发送文本指令</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        var _voiceCapture = null;
        var _voiceStream = null;
        async function toggleVoice() {
            var btn = document.getElementById('voice-btn');
            if (_voiceCapture && _voiceCapture.isRecording) {
                _voiceCapture.stop();
                return;
            }
            if (_voiceCapture) { _voiceCapture.destroy(); _voiceCapture = null; }
            var result = await VoiceCaptureUtil.quickCapture({
                onStart: function() {
                    btn.textContent = '⏹ 停止录音'; btn.style.background = '#e74c3c';
                    document.getElementById('voice-text').textContent = '正在录音...';
                },
                onStop: function() {
                    btn.textContent = '🎤 开始录音'; btn.style.background = '';
                },
                onResult: function(vdata) {
                    var text = vdata.text || '识别失败';
                    document.getElementById('voice-text').textContent = text;
                    if (vdata.command) {
                        document.getElementById('cmd-type').textContent = vdata.command.type||'move';
                        document.getElementById('cmd-param').textContent = vdata.command.param1||0;
                        document.getElementById('cmd-conf').textContent = vdata.command.confidence ? (vdata.command.confidence*100).toFixed(1)+'%' : '50%';
                        document.getElementById('exec-status').textContent = '已执行';
                    }
                },
                onError: function(msg) {
                    document.getElementById('voice-text').textContent = msg;
                }
            });
            if (result.success) {
                _voiceCapture = result.capturer;
                _voiceStream = result.stream;
            } else {
                alert('麦克风访问失败: ' + result.error);
            }
        }
        async function sendTextCommand() {
            var cmd = document.getElementById('text-cmd').value;
            if (!cmd) return;
            try {
                var resp = await SelfLnnApi.request('/robot/command', { method:'POST', body:JSON.stringify({command:cmd}) }, 1);
                var data = await resp.json();
                document.getElementById('cmd-type').textContent = cmd;
                document.getElementById('exec-status').textContent = data.success ? '已执行' : '失败';
            } catch(e) { document.getElementById('exec-status').textContent = '连接失败'; }
        }
    </script>
</body>
</html>
